- defaults:
    shell:
      stdout: true
      stderr: true

- clean: ['~']

- link:
    # Home files
    ~/:
      glob: true
      path: home/.*
      create: true
      relink: true
      force: true
    # Agents Instructions
    ~/.codex/AGENTS.md:
      path: agents/AGENTS.md
      if: test -d ~/.codex
    ~/.cursor/AGENTS.md:
      path: agents/AGENTS.md
      if: test -d ~/.cursor
    ~/.config/agents/AGENTS.md:
      path: agents/AGENTS.md
      if: test -d ~/.config/agents
    ~/.config/github-copilot/AGENTS.md:
      path: agents/AGENTS.md
      if: test -d ~/.config/github-copilot
    ~/.config/opencode/AGENTS.md:
      path: agents/AGENTS.md
      if: test -d ~/.config/opencode

- create:
    - ~/.config

- shell:
    - description: Installing submodules
      command: git submodule update --init --recursive

    - description: Installing zgen
      command: ./scripts/zgen

    - description: Scaffolding Project folders
      command: ./scripts/projects

    - description: Run ./scripts/bootstrap to bootstrap new machine
      command: echo "bash $DOTFILES/scripts/bootstrap"
